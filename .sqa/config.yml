config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/publicsqaas-testing:
      branch: main
      repo: https://github.com/PalomoIFCA/publicsqaas-testing
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing git:
        commands:
        - /usr/bin/env sh .sqa/script.bumpy-periwinkle-beetle.sh
        container: qc.acc_muggy-yellow-squid
  QC.Doc:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.snoopy-grey-opossum.sh
        container: qc.doc_snazzy-azure-insect
      github.com/PalomoIFCA/publicsqaas-testing git:
        commands:
        - /usr/bin/env sh .sqa/script.wimpy-viridian-crane.sh
        container: qc.doc_breezy-harlequin-hyena
      github.com/PalomoIFCA/publicsqaas-testing markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.thirsty-lime-mastiff.sh
        container: qc.doc_crappy-beige-beetle
  QC.Lic:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing licensee:
        commands:
        - /usr/bin/env sh .sqa/script.fuzzy-wheat-bear.sh
        container: qc.lic_nerdy-black-raccoon
  QC.Sec:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing bandit:
        commands:
        - /usr/bin/env sh .sqa/script.droopy-red-lizard.sh
        container: qc.sec_seedy-bistre-dragonfly
  QC.Sty:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing flake8:
        commands:
        - /usr/bin/env sh .sqa/script.wiggy-amaranth-alligator.sh
        container: qc.sty_leaky-dandelion-hedgehog
  QC.Uni:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing pytest:
        commands:
        - /usr/bin/env sh .sqa/script.smelly-saffron-armadillo.sh
        container: qc.uni_cozy-beige-tiger
  QC.Ver:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.lumpy-ultramarine-flamingo.sh
        container: qc.ver_snappy-violet-zorse
timeout: 5400
