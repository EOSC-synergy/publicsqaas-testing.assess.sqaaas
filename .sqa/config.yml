      github.com/PalomoIFCA/publicsqaas-testing flake8:
        commands:
        - /usr/bin/env sh .sqa/script.seafoam_serene_buffalo.sh
        container: qc.sty_persimmon_lively_flounder
  QC.Uni:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing pytest:
        commands:
        - /usr/bin/env sh .sqa/script.tide_wondrous_baboon.sh
        container: qc.uni_ecru_understanding_weasel
  QC.Ver:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.frost_worried_elk.sh
        container: qc.ver_banana_tranquil_macaw
