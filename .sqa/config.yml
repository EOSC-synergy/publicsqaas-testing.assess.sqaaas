    repos:
      github.com/PalomoIFCA/publicsqaas-testing bandit:
        commands:
        - /usr/bin/env sh .sqa/script.arctic_jubilant_penguin.sh
        container: qc.sec_fuchsia_sad_axolotl
  QC.Sty:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing flake8:
        commands:
        - /usr/bin/env sh .sqa/script.wave_enigmatic_camel.sh
        container: qc.sty_bluebell_zany_grizzly
  QC.Uni:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing pytest:
        commands:
        - /usr/bin/env sh .sqa/script.heather_generous_gnu.sh
        container: qc.uni_jasmine_open_puffin
  QC.Ver:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.cherry_shrewd_antelope.sh
        container: qc.ver_bronze_enthusiastic_catfish
