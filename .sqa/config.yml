config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: fix/updatego
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/publicsqaas-testing:
      branch: main
      repo: https://github.com/PalomoIFCA/publicsqaas-testing
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing git:
        commands:
        - /usr/bin/env sh .sqa/script.cornflower_brave_horse.sh
        container: qc.acc_caramel_diligent_platypus
  QC.Doc:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.blush_anxious_orangutan.sh
        container: qc.doc_pumpkin_romantic_impala
      github.com/PalomoIFCA/publicsqaas-testing git:
        commands:
        - /usr/bin/env sh .sqa/script.marina_mysterious_sphinx.sh
        container: qc.doc_raven_adaptable_manatee
      github.com/PalomoIFCA/publicsqaas-testing markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.bronze_brilliant_grasshopper.sh
        container: qc.doc_royal_decisive_toucan
  QC.Lic:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing licensee:
        commands:
        - /usr/bin/env sh .sqa/script.beige_responsible_catfish.sh
        container: qc.lic_glaucous_grateful_wolverine
  QC.Sec:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing bandit:
        commands:
        - /usr/bin/env sh .sqa/script.cobalt_apprehensive_hedgehog.sh
        container: qc.sec_ice_enigmatic_jaguar
  QC.Sty:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing flake8:
        commands:
        - /usr/bin/env sh .sqa/script.pineapple_daring_starfish.sh
        container: qc.sty_peach_nurturing_anaconda
  QC.Uni:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing pytest:
        commands:
        - /usr/bin/env sh .sqa/script.linen_zany_chinchilla.sh
        container: qc.uni_pumpkin_vigilant_axolotl
  QC.Ver:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.mango_foolish_bullfrog.sh
        container: qc.ver_boysenberry_bubbly_ocelot
timeout: 5400
