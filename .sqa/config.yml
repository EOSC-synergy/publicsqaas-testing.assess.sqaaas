      github.com/PalomoIFCA/publicsqaas-testing find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.cyan_diligent_capybara.sh
        container: qc.doc_aqua_savvy_nymph
      github.com/PalomoIFCA/publicsqaas-testing git:
        commands:
        - /usr/bin/env sh .sqa/script.flax_vibrant_ostrich.sh
        container: qc.doc_olive_audacious_sloth
      github.com/PalomoIFCA/publicsqaas-testing markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.lime_calm_rattlesnake.sh
        container: qc.doc_cardamom_motivated_frog
