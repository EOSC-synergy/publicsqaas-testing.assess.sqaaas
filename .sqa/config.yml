        - /usr/bin/env sh .sqa/script.mulberry_nurturing_bullfrog.sh
        container: qc.sty_cobalt_frugal_butterfly
  QC.Uni:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing pytest:
        commands:
        - /usr/bin/env sh .sqa/script.navy_inspired_snail.sh
        container: qc.uni_byzantium_content_catfish
