      github.com/PalomoIFCA/publicsqaas-testing git:
        commands:
        - /usr/bin/env sh .sqa/script.heather_driven_eagle.sh
        container: qc.doc_tan_frugal_sphinx
      github.com/PalomoIFCA/publicsqaas-testing markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.ultramarine_worried_dragon.sh
        container: qc.doc_marigold_organized_catfish
