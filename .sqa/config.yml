config:
  credentials:
  - id: https://github.com/PalomoIFCA/publicsqaas-testing
    password_var: GIT_PASSWORD
    username_var: GIT_USER
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: fix/updatego
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/publicsqaas-testing:
      branch: main
      credential_tmp: true
      credentials_id: https://github.com/PalomoIFCA/publicsqaas-testing
      repo: https://github.com/PalomoIFCA/publicsqaas-testing
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing git:
        commands:
        - /usr/bin/env sh .sqa/script.crimson_sad_kangaroo.sh
        container: qc.acc_amethyst_adventurous_grasshopper
  QC.Doc:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.thistle_relaxed_termite.sh
        container: qc.doc_turmeric_tactful_puffin
      github.com/PalomoIFCA/publicsqaas-testing git:
        commands:
        - /usr/bin/env sh .sqa/script.ice_skeptical_falcon.sh
        container: qc.doc_rust_confident_turtle
      github.com/PalomoIFCA/publicsqaas-testing markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.coffee_sympathetic_komodo.sh
        container: qc.doc_azure_eccentric_roadrunner
  QC.Lic:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing licensee:
        commands:
        - /usr/bin/env sh .sqa/script.steel_smart_starfish.sh
        container: qc.lic_aquamarine_bewildered_coyote
  QC.Sec:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing bandit:
        commands:
        - /usr/bin/env sh .sqa/script.powder_zany_caribou.sh
        container: qc.sec_grape_confused_hedgehog
  QC.Sty:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing flake8:
        commands:
        - /usr/bin/env sh .sqa/script.steel_funny_crow.sh
        container: qc.sty_coral_nervous_giraffe
  QC.Uni:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing pytest:
        commands:
        - /usr/bin/env sh .sqa/script.sapphire_ardent_vulture.sh
        container: qc.uni_pumpkin_thoughtful_giraffe
  QC.Ver:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.polar_dizzy_wolf.sh
        container: qc.ver_cosmos_enthusiastic_quokka
timeout: 5400
