        - /usr/bin/env sh .sqa/script.viridian_apprehensive_giraffe.sh
        container: qc.acc_mist_cautious_flamingo
  QC.Doc:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.flint_tolerant_boa.sh
        container: qc.doc_coral_tolerant_weasel
      github.com/PalomoIFCA/publicsqaas-testing git:
        commands:
        - /usr/bin/env sh .sqa/script.ivory_easygoing_buffalo.sh
        container: qc.doc_byzantium_analytical_hare
      github.com/PalomoIFCA/publicsqaas-testing markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.denim_practical_porpoise.sh
        container: qc.doc_orchid_logical_coyote
