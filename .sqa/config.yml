        - /usr/bin/env sh .sqa/script.khaki_practical_raven.sh
        container: qc.acc_espresso_vibrant_tortoise
  QC.Doc:
    repos:
      github.com/PalomoIFCA/publicsqaas-testing find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.tundra_industrious_groundhog.sh
        container: qc.doc_linen_decisive_quail
      github.com/PalomoIFCA/publicsqaas-testing git:
        commands:
        - /usr/bin/env sh .sqa/script.eggplant_cranky_chameleon.sh
        container: qc.doc_jasmine_exuberant_wildcat
      github.com/PalomoIFCA/publicsqaas-testing markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.celadon_bold_dormouse.sh
        container: qc.doc_coral_devoted_donkey
